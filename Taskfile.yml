version: '3'

vars:
  BINARY_NAME: imgconverter
  BUILD_DIR: ./build

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the binary for current OS
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}} -ldflags="-s -w" .
      - echo "Built to {{.BUILD_DIR}}/{{.BINARY_NAME}}"

  build-all:
    desc: Build for all platforms
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - task: build-darwin-amd64
      - task: build-darwin-arm64
      - task: build-linux-amd64
      - task: build-linux-arm64
      - task: build-windows-amd64
      - echo "Built all platforms"

  build-darwin-amd64:
    desc: Build for macOS AMD64
    cmds:
      - GOOS=darwin GOARCH=amd64 go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-darwin-amd64 -ldflags="-s -w" .

  build-darwin-arm64:
    desc: Build for macOS ARM64 (M1/M2/M3)
    cmds:
      - GOOS=darwin GOARCH=arm64 go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-darwin-arm64 -ldflags="-s -w" .

  build-linux-amd64:
    desc: Build for Linux AMD64
    cmds:
      - GOOS=linux GOARCH=amd64 go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-amd64 -ldflags="-s -w" .

  build-linux-arm64:
    desc: Build for Linux ARM64
    cmds:
      - GOOS=linux GOARCH=arm64 go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-arm64 -ldflags="-s -w" .

  build-windows-amd64:
    desc: Build for Windows AMD64
    cmds:
      - GOOS=windows GOARCH=amd64 go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-windows-amd64.exe -ldflags="-s -w" .

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - echo "Cleaned build directory"

  run:
    desc: Build and run the converter (creates converter dir if needed)
    cmds:
      - task: build
      - mkdir -p converter
      - ./{{.BUILD_DIR}}/{{.BINARY_NAME}}

  deps:
    desc: Download dependencies
    cmds:
      - go mod download
      - go mod tidy

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  lint:
    desc: Check for issues
    cmds:
      - go vet ./...

  check:
    desc: Run all checks (fmt, vet, test)
    cmds:
      - task: fmt
      - task: lint
      - task: test

  release:
    desc: Build release binaries and create archive
    cmds:
      - task: clean
      - task: build-all
      - mkdir -p release
      - tar -czf release/imgconverter-darwin-amd64.tar.gz -C {{.BUILD_DIR}} imgconverter-darwin-amd64
      - tar -czf release/imgconverter-darwin-arm64.tar.gz -C {{.BUILD_DIR}} imgconverter-darwin-arm64
      - tar -czf release/imgconverter-linux-amd64.tar.gz -C {{.BUILD_DIR}} imgconverter-linux-amd64
      - tar -czf release/imgconverter-linux-arm64.tar.gz -C {{.BUILD_DIR}} imgconverter-linux-arm64
      - zip -j release/imgconverter-windows-amd64.zip {{.BUILD_DIR}}/imgconverter-windows-amd64.exe
      - echo "Release archives created in release/"
