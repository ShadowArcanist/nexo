name: Build macOS Binary

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build macOS ${{ matrix.goarch }}
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        goarch:
          - arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/imgconverter-darwin-${GOARCH}" .
          chmod +x "dist/imgconverter-darwin-${GOARCH}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: imgconverter-darwin-${{ matrix.goarch }}
          path: dist/imgconverter-darwin-${{ matrix.goarch }}
          if-no-files-found: error
